<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSKAR OS | Director Interface</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Inter+Tight:wght@500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: 'var(--bg-app)',
                        surface: 'var(--bg-card)',
                        'surface-hover': 'var(--bg-card-hover)',
                        border: 'var(--border-card)',
                        'border-strong': 'var(--text-muted)',
                        primary: 'var(--text-main)',
                        secondary: 'var(--text-muted)',
                        accent: 'var(--accent)',
                        'accent-dim': 'var(--accent-dim)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Inter Tight', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'card': 'var(--shadow-card)',
                    }
                }
            }
        }
    </script>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            /* Default: ONYX (Dark/Tech) */
            --bg-app: #09090b;
            --bg-card: #18181b;
            --bg-card-hover: #27272a;
            --border-card: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #3b82f6; /* Blue-500 */
            --accent-dim: rgba(59, 130, 246, 0.15);
            
            --radius-card: 12px;
            --gap-app: 12px;
            --padding-app: 12px;
            --shadow-card: 0 1px 3px 0 rgba(0, 0, 0, 0.2), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
        }

        .theme-polar {
            /* POLAR (Light/Clean/Soft) */
            --bg-app: #f1f5f9; /* Slate-100 */
            --bg-card: #ffffff;
            --bg-card-hover: #f8fafc;
            --border-card: transparent;
            --text-main: #0f172a; /* Slate-900 */
            --text-muted: #64748b; /* Slate-500 */
            --accent: #0f172a; 
            --accent-dim: rgba(15, 23, 42, 0.05);
            
            --radius-card: 20px;
            --gap-app: 20px;
            --padding-app: 20px;
            --shadow-card: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
        }

        .theme-tokyo {
            /* TOKYO (Vibrant/Sharp/Pop) */
            --bg-app: #e0e7ff; /* Indigo-100 */
            --bg-card: #ffffff;
            --bg-card-hover: #fdf4ff;
            --border-card: #000000;
            --text-main: #000000;
            --text-muted: #4b5563;
            --accent: #ec4899; /* Pink-500 */
            --accent-dim: rgba(236, 72, 153, 0.1);
            
            --radius-card: 0px;
            --gap-app: 12px;
            --padding-app: 12px;
            --shadow-card: 4px 4px 0px 0px #000000;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 4px;
        }
        
        .theme-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bento-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        .grid-pattern {
            background-image: 
                linear-gradient(to right, var(--text-muted) 1px, transparent 1px),
                linear-gradient(to bottom, var(--text-muted) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- Icons Component Helper ---
        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        // --- Mock Data ---
        const MOCK_ASSETS = [
            { id: 1, name: 'hero_lifestyle_01.jpg', url: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=2070&auto=format&fit=crop', type: 'source', meta: 'RAW' },
            { id: 2, name: 'product_detail_side.png', url: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1999&auto=format&fit=crop', type: 'source', meta: 'RAW' },
            { id: 3, name: 'brand_texture_noise.png', url: 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop', type: 'source', meta: 'TEX' },
            { id: 4, name: 'campaign_v1_generated.jpg', url: 'https://images.unsplash.com/photo-1491553895911-0055eca6402d?q=80&w=1780&auto=format&fit=crop', type: 'generated', meta: 'GEN' },
            { id: 5, name: 'ref_arch_02.jpg', url: 'https://images.unsplash.com/photo-1486718448742-163732cd1544?q=80&w=1000&auto=format&fit=crop', type: 'source', meta: 'REF' },
        ];

        const MOCK_MESSAGES = [
            { id: 1, role: 'assistant', content: 'Bento Grid System initialized. Theme engine ready.', time: '10:42 AM' },
            { id: 2, role: 'user', content: 'Switch to Tokyo mode. I need more energy.', time: '10:43 AM' },
            { id: 3, role: 'assistant', content: 'Applying high-contrast palette with vibrant accents.', time: '10:43 AM' },
        ];

        // --- Components ---

        const ThemeSwitcher = ({ currentTheme, setTheme }) => {
            const themes = [
                { id: 'default', label: 'ONYX', icon: 'moon' },
                { id: 'theme-polar', label: 'POLAR', icon: 'sun' },
                { id: 'theme-tokyo', label: 'TOKYO', icon: 'zap' },
            ];

            return (
                <div className="flex items-center gap-2 bg-background/50 p-1 rounded-lg border border-border/50">
                    {themes.map(t => (
                        <button
                            key={t.id}
                            onClick={() => setTheme(t.id)}
                            className={`
                                relative px-3 py-1.5 text-[10px] font-bold tracking-wide transition-all rounded-md flex items-center gap-2
                                ${currentTheme === t.id 
                                    ? 'text-background bg-primary shadow-sm' 
                                    : 'text-secondary hover:text-primary hover:bg-surface-hover'}
                            `}
                        >
                            <Icon name={t.icon} size={10} />
                            {t.label}
                        </button>
                    ))}
                </div>
            );
        };

        const TopBar = ({ sessionName, layoutMode, setLayoutMode, currentTheme, setTheme }) => {
            return (
                <header className="h-full bento-card flex items-center justify-between px-6 theme-transition select-none bg-surface">
                    <div className="flex items-center gap-6">
                        {/* Logo */}
                        <div className="flex items-center gap-3 group cursor-pointer">
                            <div className="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-background shadow-sm">
                                <Icon name="box" size={16} />
                            </div>
                            <span className="font-display font-bold text-lg tracking-tight text-primary">BENTO<span className="opacity-50 font-normal">.OS</span></span>
                        </div>
                        
                        <div className="h-6 w-px bg-border"></div>
                        
                        {/* Session Info */}
                        <div className="flex flex-col">
                            <span className="text-[9px] text-secondary font-mono uppercase tracking-widest leading-none mb-1">Project</span>
                            <span className="text-xs text-primary font-bold tracking-wide leading-none">{sessionName}</span>
                        </div>
                    </div>

                    <div className="flex items-center gap-4">
                        {/* Layout Controls */}
                        <div className="flex items-center gap-1 bg-background/50 p-1 rounded-lg border border-border/50">
                            <button 
                                onClick={() => setLayoutMode('2-panel')}
                                className={`p-1.5 rounded-md transition-all ${layoutMode === '2-panel' ? 'bg-primary text-background shadow-sm' : 'text-secondary hover:text-primary'}`}
                                title="Focus Mode"
                            >
                                <Icon name="columns" size={14} />
                            </button>
                            <button 
                                onClick={() => setLayoutMode('3-panel')}
                                className={`p-1.5 rounded-md transition-all ${layoutMode === '3-panel' ? 'bg-primary text-background shadow-sm' : 'text-secondary hover:text-primary'}`}
                                title="Studio Mode"
                            >
                                <Icon name="layout-grid" size={14} />
                            </button>
                        </div>

                        <ThemeSwitcher currentTheme={currentTheme} setTheme={setTheme} />
                        
                        {/* User */}
                        <div className="w-9 h-9 rounded-full bg-gradient-to-tr from-accent to-purple-500 p-[2px] cursor-pointer hover:scale-105 transition-transform">
                            <div className="w-full h-full rounded-full bg-surface border border-border flex items-center justify-center text-xs font-bold text-primary">
                                JD
                            </div>
                        </div>
                    </div>
                </header>
            );
        };

        const AssetCard = ({ asset, isSelected, onClick }) => (
            <div 
                onClick={onClick}
                className={`
                    group relative aspect-square rounded-lg border cursor-pointer overflow-hidden transition-all duration-300 theme-transition
                    ${isSelected ? 'border-accent ring-2 ring-accent ring-offset-2 ring-offset-surface z-10' : 'border-border hover:border-accent/50'}
                `}
            >
                <img src={asset.url} alt={asset.name} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                
                {/* Tech Overlay */}
                <div className="absolute inset-0 p-3 flex flex-col justify-end opacity-0 group-hover:opacity-100 transition-opacity duration-200 bg-black/40">
                   <div className="bg-surface/90 backdrop-blur-md p-2 rounded-md border border-white/10 shadow-lg transform translate-y-2 group-hover:translate-y-0 transition-transform">
                        <p className="text-[10px] font-bold text-primary truncate">{asset.name}</p>
                        <div className="flex justify-between items-center mt-1">
                            <span className="text-[8px] font-mono text-secondary uppercase bg-background px-1.5 py-0.5 rounded">{asset.meta}</span>
                            <span className="text-[8px] font-mono text-secondary">2MB</span>
                        </div>
                   </div>
                </div>
            </div>
        );

        const AssetsPanel = ({ assets, selectedAssetId, onSelect }) => {
            return (
                <div className="h-full flex flex-col bg-surface theme-transition">
                    {/* Header */}
                    <div className="h-14 border-b border-border flex items-center justify-between px-5 shrink-0">
                        <span className="text-xs font-bold uppercase tracking-wider text-primary flex items-center gap-2">
                            <Icon name="library" size={14} className="text-accent" />
                            Library
                        </span>
                        <span className="text-[10px] font-mono text-secondary px-2 py-0.5 rounded-full bg-background border border-border">{assets.length} items</span>
                    </div>

                    {/* Content */}
                    <div className="p-4 grid grid-cols-2 gap-3 overflow-y-auto content-start flex-1 custom-scrollbar">
                        <div className="aspect-square rounded-lg border-2 border-dashed border-border flex flex-col items-center justify-center gap-2 text-secondary hover:text-accent hover:border-accent hover:bg-accent-dim transition-all cursor-pointer group">
                            <div className="w-10 h-10 rounded-full bg-background flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform">
                                <Icon name="upload-cloud" size={18} />
                            </div>
                            <span className="text-[10px] font-bold">Upload</span>
                        </div>
                        
                        {assets.map(asset => (
                            <AssetCard 
                                key={asset.id} 
                                asset={asset} 
                                isSelected={selectedAssetId === asset.id} 
                                onClick={() => onSelect(asset)} 
                            />
                        ))}
                    </div>
                </div>
            );
        };

        const CanvasPanel = ({ layoutMode, directorMode, setDirectorMode, currentTheme }) => {
            const [selectedTab, setSelectedTab] = useState('vibe-1');
            
            const tabs = [
                { id: 'vibe-1', label: 'Zurich' },
                { id: 'vibe-2', label: 'Tokyo' },
                { id: 'moodboard', label: 'Mood' },
            ];

            return (
                <div className="h-full flex flex-col bg-surface relative overflow-hidden group/canvas theme-transition">
                    {/* Canvas Toolbar */}
                    <div className="h-14 border-b border-border flex items-center justify-between px-5 bg-surface z-20 shrink-0">
                         <div className="flex items-center p-1 bg-background rounded-lg border border-border">
                            {tabs.map((tab) => {
                                const isActive = selectedTab === tab.id;
                                return (
                                    <button 
                                        key={tab.id}
                                        onClick={() => setSelectedTab(tab.id)}
                                        className={`
                                            px-4 py-1.5 text-[10px] font-bold uppercase tracking-wider rounded-md transition-all
                                            ${isActive 
                                                ? 'bg-surface text-primary shadow-sm ring-1 ring-border' 
                                                : 'text-secondary hover:text-primary'}
                                        `}
                                    >
                                        {tab.label}
                                    </button>
                                )
                            })}
                         </div>
                         
                         <div className="flex items-center gap-3">
                             <div className="flex items-center gap-2 px-3 py-1.5 bg-background rounded-full border border-border">
                                <div className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></div>
                                <span className="text-[10px] font-mono text-secondary uppercase">Live Preview</span>
                             </div>
                             
                             <button 
                                onClick={() => setDirectorMode(!directorMode)}
                                className={`
                                    p-2 rounded-lg border transition-all duration-300
                                    ${directorMode 
                                        ? 'bg-accent text-white border-accent shadow-lg shadow-accent/20' 
                                        : 'bg-background text-secondary border-border hover:border-primary hover:text-primary'}
                                `}
                                title="Director Mode"
                             >
                                <Icon name="pen-tool" size={16} />
                             </button>
                         </div>
                    </div>

                    {/* Canvas Area */}
                    <div className="flex-1 relative flex items-center justify-center bg-background/30 p-8 overflow-hidden">
                        {/* Dot Grid Background */}
                        <div 
                            className="absolute inset-0 opacity-20 pointer-events-none" 
                            style={{ 
                                backgroundImage: `radial-gradient(circle at 1px 1px, var(--text-muted) 1px, transparent 0)`, 
                                backgroundSize: '24px 24px' 
                            }}
                        ></div>
                        
                        {/* Fake Website Frame */}
                        <div className="w-full h-full max-w-4xl mx-auto transition-all duration-500 shadow-2xl relative z-10 rounded-xl overflow-hidden border border-border-strong bg-white">
                            
                            {/* Browser Header */}
                            <div className="h-6 bg-[#f1f1f1] border-b border-[#e1e1e1] flex items-center px-3 gap-1.5">
                                <div className="w-2.5 h-2.5 rounded-full bg-[#ff5f56]"></div>
                                <div className="w-2.5 h-2.5 rounded-full bg-[#ffbd2e]"></div>
                                <div className="w-2.5 h-2.5 rounded-full bg-[#27c93f]"></div>
                            </div>

                            <div className="h-full overflow-y-auto relative bg-white pb-20">
                                {/* Editorial Design */}
                                <div className="p-12 pb-24 text-black font-sans">
                                    <h1 className="text-8xl font-black tracking-tighter mb-4 leading-[0.85]">
                                        SUPER<br/>FLAT
                                    </h1>
                                    <div className="flex gap-8 mb-16 items-start">
                                        <div className="w-32 h-1 bg-black mt-2"></div>
                                        <p className="max-w-xs text-sm font-medium leading-relaxed">
                                            Objects are not just things. They are condensed energy. 
                                            We explore the surface of reality through form and void.
                                        </p>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-8">
                                        <div className="aspect-[4/5] bg-gray-100 relative overflow-hidden group">
                                            <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1000&auto=format&fit=crop" className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" />
                                        </div>
                                        <div className="pt-24 space-y-6">
                                            <div className="aspect-square bg-black text-white p-8 flex flex-col justify-between">
                                                <span className="text-4xl font-bold">01</span>
                                                <span className="text-xl uppercase tracking-widest text-right">The Mono<br/>Collection</span>
                                            </div>
                                            <p className="text-xs uppercase tracking-widest text-gray-400">Fig 1.2 — Architecture of Cloth</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Director Mode Overlay */}
                            {directorMode && (
                                <div className="absolute inset-0 z-50 pointer-events-none">
                                    <div className="absolute top-12 left-16 w-[400px] h-[180px] border-2 border-accent bg-accent-dim pointer-events-auto cursor-pointer group/overlay rounded-lg">
                                        <div className="absolute -top-3 left-4 bg-accent text-white text-[9px] px-2 py-0.5 font-bold uppercase tracking-wider rounded-full shadow-sm">
                                            H1.Display
                                        </div>
                                        <div className="absolute -right-1 -bottom-1 w-3 h-3 bg-accent rounded-full border-2 border-white"></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const ChatMessage = ({ msg }) => (
            <div className={`flex flex-col mb-6 animate-fade-in ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                <div className={`
                    max-w-[85%] p-4 rounded-2xl text-sm leading-relaxed shadow-sm
                    ${msg.role === 'user' 
                        ? 'bg-primary text-background rounded-tr-none' 
                        : 'bg-background border border-border text-primary rounded-tl-none'}
                `}>
                    {msg.content}
                </div>
                <span className="text-[9px] font-mono text-secondary mt-2 opacity-50 px-1">{msg.time}</span>
            </div>
        );

        const ConversationPanel = ({ messages }) => {
            const [inputValue, setInputValue] = useState('');
            const endRef = useRef(null);

            return (
                <div className="h-full flex flex-col bg-surface theme-transition">
                    {/* Header */}
                    <div className="h-14 border-b border-border flex items-center justify-between px-5 shrink-0">
                         <span className="text-xs font-bold uppercase tracking-wider text-primary flex items-center gap-2">
                            <Icon name="message-square" size={14} className="text-accent" />
                            Briefing
                        </span>
                        <div className="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]"></div>
                    </div>
                    
                    {/* Chat Log */}
                    <div className="flex-1 overflow-y-auto p-5 custom-scrollbar bg-surface/50">
                        {messages.map(m => <ChatMessage key={m.id} msg={m} />)}
                        <div ref={endRef}></div>
                    </div>

                    {/* Input Area */}
                    <div className="p-4 border-t border-border bg-background/50 backdrop-blur-sm">
                        <div className="relative">
                            <input 
                                value={inputValue}
                                onChange={(e) => setInputValue(e.target.value)}
                                placeholder="Type a command or instruction..."
                                className="w-full bg-surface border border-border rounded-xl py-3 pl-4 pr-12 text-sm text-primary focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all shadow-sm"
                            />
                            <button className="absolute right-2 top-2 p-1.5 rounded-lg bg-primary text-background hover:opacity-90 transition-opacity">
                                <Icon name="arrow-up" size={16} />
                            </button>
                        </div>
                        <div className="flex justify-between items-center mt-3 px-1">
                             <div className="flex gap-2">
                                <button className="p-1.5 text-secondary hover:text-primary hover:bg-surface rounded-md transition-colors">
                                    <Icon name="paperclip" size={14} />
                                </button>
                                <button className="p-1.5 text-secondary hover:text-primary hover:bg-surface rounded-md transition-colors">
                                    <Icon name="mic" size={14} />
                                </button>
                             </div>
                             <span className="text-[9px] font-mono text-secondary">AI ACTIVE</span>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [layoutMode, setLayoutMode] = useState('3-panel'); 
            const [directorMode, setDirectorMode] = useState(false);
            const [currentTheme, setCurrentTheme] = useState('default');
            const [selectedAssetId, setSelectedAssetId] = useState(null);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [layoutMode, currentTheme]);

            return (
                <div className={`
                    h-screen w-screen bg-background text-primary theme-transition
                    p-[var(--padding-app)] box-border flex flex-col gap-[var(--gap-app)]
                    ${currentTheme}
                `}>
                    {/* Top Bar - Fixed height */}
                    <div className="shrink-0 h-16">
                        <TopBar 
                            sessionName="CAMPAIGN_24" 
                            layoutMode={layoutMode}
                            setLayoutMode={setLayoutMode}
                            currentTheme={currentTheme}
                            setTheme={setCurrentTheme}
                        />
                    </div>
                    
                    {/* Main Grid Content */}
                    <div className="flex-1 min-h-0 grid grid-cols-12 gap-[var(--gap-app)]">
                        {/* Left: Assets */}
                        <div className={`
                            ${layoutMode === '2-panel' ? 'col-span-4' : 'col-span-2'} 
                            bento-card
                        `}>
                            <AssetsPanel 
                                assets={MOCK_ASSETS} 
                                selectedAssetId={selectedAssetId} 
                                onSelect={(a) => setSelectedAssetId(a.id)} 
                            />
                        </div>

                        {/* Center: Canvas */}
                        <div className={`
                            ${layoutMode === '2-panel' ? 'hidden' : 'col-span-7'} 
                            bento-card
                        `}>
                            <CanvasPanel 
                                layoutMode={layoutMode} 
                                directorMode={directorMode} 
                                setDirectorMode={setDirectorMode} 
                                currentTheme={currentTheme}
                            />
                        </div>

                        {/* Right: Chat */}
                        <div className={`
                            ${layoutMode === '2-panel' ? 'col-span-8' : 'col-span-3'} 
                            bento-card
                        `}>
                            <ConversationPanel messages={MOCK_MESSAGES} />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
